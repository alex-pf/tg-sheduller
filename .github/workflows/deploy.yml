name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/tg-scheduler
            git pull origin main
            venv/bin/pip install -r requirements.txt --quiet
            sudo systemctl stop tg-scheduler
            sleep 20
            sudo systemctl start tg-scheduler
            sleep 5
            sudo systemctl status tg-scheduler --no-pager
